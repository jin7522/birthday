<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Young Kim Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Noto+Serif+KR:wght@700;900&family=Jua&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff6b9d;
    --coral: #ff8c69;
    --yellow: #ffd93d;
    --mint: #6bcb77;
    --sky: #4d96ff;
    --purple: #c77dff;
    --bg: #fff9f0;
    --white: #ffffff;
    --dark: #2d2d2d;
    --gray: #888;
    --red: #e8192c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Fira Code', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1rem;
    position: relative; overflow-x: hidden;
  }

  .blob { position:fixed; border-radius:50%; filter:blur(80px); opacity:0.25; pointer-events:none; z-index:0; }
  .blob-1 { width:400px; height:400px; background:var(--pink); top:-100px; left:-100px; animation:float1 8s ease-in-out infinite; }
  .blob-2 { width:350px; height:350px; background:var(--yellow); top:50%; right:-100px; animation:float2 10s ease-in-out infinite; }
  .blob-3 { width:300px; height:300px; background:var(--mint); bottom:-80px; left:30%; animation:float1 7s ease-in-out infinite 2s; }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,30px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

  .card {
    position:relative; z-index:1; width:100%; max-width:680px;
    background:var(--white); border-radius:24px;
    box-shadow:0 20px 80px rgba(255,107,157,0.15), 0 4px 20px rgba(0,0,0,0.06);
    overflow:hidden; opacity:0; transform:translateY(40px);
    animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards 0.2s;
  }
  @keyframes slideUp { to { opacity:1; transform:translateY(0); } }

  .browser-bar {
    background:#f0f0f0; border-bottom:2px solid #e0e0e0;
    padding:12px 20px; display:flex; align-items:center; gap:12px;
    cursor:pointer; user-select:none;
  }
  .browser-bar:hover { background:#e8e8e8; }
  .dots { display:flex; gap:7px; }
  .dot { width:13px; height:13px; border-radius:50%; }
  .dot.r{background:#ff5f57} .dot.y{background:#febc2e} .dot.g{background:#28c840}
  .url-bar {
    flex:1; background:white; border:1.5px solid #ddd; border-radius:8px;
    padding:6px 14px; font-size:12px; color:var(--gray);
    display:flex; align-items:center; gap:6px;
  }
  .url-pink { color:var(--pink); font-weight:600; }
  .toggle-hint { font-size:10px; color:#bbb; letter-spacing:1px; white-space:nowrap; }

  .editor {
    display:grid; grid-template-columns:48px 1fr;
    background:#fafafa; border-bottom:2px solid #f0f0f0;
    max-height:0; overflow:hidden;
    transition:max-height 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .editor.visible { max-height:500px; }
  .line-nums { background:#f5f5f5; border-right:2px solid #ebebeb; padding:24px 0; text-align:center; }
  .ln { font-size:12px; color:#ccc; line-height:2; user-select:none; }
  .code-area { padding:24px 20px; overflow-x:auto; }
  .code-line { font-size:13px; line-height:2; white-space:nowrap; opacity:0; }
  .editor.visible .code-line:nth-child(1)  { animation:appear 0s forwards 0.1s; }
  .editor.visible .code-line:nth-child(2)  { animation:appear 0s forwards 0.2s; }
  .editor.visible .code-line:nth-child(3)  { animation:appear 0s forwards 0.3s; }
  .editor.visible .code-line:nth-child(4)  { animation:appear 0s forwards 0.4s; }
  .editor.visible .code-line:nth-child(5)  { animation:appear 0s forwards 0.5s; }
  .editor.visible .code-line:nth-child(6)  { animation:appear 0s forwards 0.6s; }
  .editor.visible .code-line:nth-child(7)  { animation:appear 0s forwards 0.7s; }
  .editor.visible .code-line:nth-child(8)  { animation:appear 0s forwards 0.8s; }
  .editor.visible .code-line:nth-child(9)  { animation:appear 0s forwards 0.9s; }
  .editor.visible .code-line:nth-child(10) { animation:appear 0s forwards 1.0s; }
  @keyframes appear { to { opacity:1; } }

  .tag{color:#e05a9a;font-weight:500} .attr{color:#c77dff} .val{color:#ff8c69}
  .str{color:#27ae60} .cmt{color:#bbb;font-style:italic} .plain{color:var(--dark)}
  .highlight-line {
    background:linear-gradient(90deg,rgba(255,107,157,0.1),transparent);
    border-left:3px solid var(--pink); padding-left:6px;
    margin-left:-6px; border-radius:2px; display:block;
  }

  .photo-section { padding:2rem; text-align:center; }
  .output-label {
    display:inline-block;
    background:linear-gradient(135deg,var(--pink),var(--coral));
    color:white; font-size:11px; letter-spacing:2px;
    padding:5px 16px; border-radius:100px; margin-bottom:1.5rem; font-weight:600;
  }

  .stage {
    position:relative; width:100%; max-width:500px;
    margin:0 auto; min-height:320px;
    display:flex; align-items:center; justify-content:center;
  }

  .slide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity 0.6s ease;
  }
  .slide.active { opacity:1; pointer-events:auto; }
  .slide::before,.slide::after {
    content:''; position:absolute; width:28px; height:28px;
    border-style:solid; border-color:var(--pink); z-index:2; pointer-events:none;
  }
  .slide::before { top:0; left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
  .slide::after  { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
  .slide img {
    display:block; width:100%; max-height:320px; border-radius:16px;
    box-shadow:0 12px 50px rgba(255,107,157,0.25), 0 4px 16px rgba(0,0,0,0.08);
    object-fit:contain;
  }
  .slide.last-photo img { animation:growUp 5s ease forwards; }
  @keyframes growUp { 0%{transform:scale(1)} 100%{transform:scale(1.1)} }

  .text-slide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity 0.6s ease;
  }
  .text-slide.active { opacity:1; }

  /* 텍스트 내용 */
  .text-content {
    font-family:'Noto Serif KR',serif;
    font-weight:900;
    font-size:3rem;
    text-align:center;
    line-height:1.7;
  }
  .text-content .point {
    background:linear-gradient(135deg,var(--pink),var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  /* ── 마흔 강조 효과 ── */
  .mahon-wrap {
    position: relative;
    display: inline-block;
  }

  /* 동그라미 SVG */
  .mahon-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130%; height: 150%;
    pointer-events: none;
    overflow: visible;
  }
  .mahon-circle circle {
    fill: none;
    stroke: var(--red);
    stroke-width: 4;
    stroke-dasharray: 320;
    stroke-dashoffset: 320;
    stroke-linecap: round;
  }
  .mahon-circle.draw circle {
    animation: drawCircle 0.7s ease forwards 0.2s;
  }
  @keyframes drawCircle {
    to { stroke-dashoffset: 0; }
  }

  /* 밑줄 1 */
  .underline-wrap {
    position: relative;
    display: inline-block;
  }
  .u-line {
    position: absolute;
    left: -4px; right: -4px;
    height: 4px;
    background: var(--red);
    border-radius: 2px;
    transform: scaleX(0);
    transform-origin: left;
  }
  .u-line.u1 { bottom: -6px; }
  .u-line.u2 { bottom: -14px; }

  .u-line.draw {
    animation: drawLine 0.4s ease forwards;
  }
  .u-line.u2.draw {
    animation: drawLine 0.4s ease forwards 0.2s;
  }
  @keyframes drawLine {
    to { transform: scaleX(1); }
  }

  /* 생일축하해 */
  .birthday-content {
    font-family:'Jua',sans-serif;
    font-size:3rem;
    text-align:center;
  }
  .birthday-content .gradient {
    background:linear-gradient(135deg,var(--pink),var(--coral),var(--yellow));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  .sticker { position:absolute; font-size:2rem; animation:wiggle 2s ease-in-out infinite; filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); z-index:3; pointer-events:none; }
  .sticker-1{top:-18px;right:-10px;animation-delay:0s}
  .sticker-2{bottom:-18px;left:-10px;animation-delay:0.5s}
  .sticker-3{top:40%;right:-24px;animation-delay:1s}
  @keyframes wiggle { 0%,100%{transform:rotate(-8deg) scale(1)} 50%{transform:rotate(8deg) scale(1.1)} }

  .dots-indicator { display:flex; justify-content:center; gap:8px; margin-top:20px; }
  .dot-ind { width:8px; height:8px; border-radius:50%; background:#ddd; transition:background 0.3s; }
  .dot-ind.active { background:var(--pink); }

  .flash-overlay {
    position:absolute; inset:0; background:white; opacity:0;
    pointer-events:none; border-radius:24px; z-index:10;
  }
  .flash-overlay.flash { animation:flashIn 0.4s ease forwards; }
  @keyframes flashIn { 0%{opacity:0} 30%{opacity:0.7} 100%{opacity:0} }

  .cursor {
    display:inline-block; width:2px; height:14px;
    background:var(--pink); vertical-align:middle; margin-left:2px;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:999; }
  .c { position:absolute; top:-20px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:0; } }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="card">
  <div class="flash-overlay" id="flash"></div>

  <div class="browser-bar" onclick="toggleCode()">
    <div class="dots">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    </div>
    <div class="url-bar">
      <span>🔒</span>
      <span class="url-pink">Young Kim Happy Birthday 🎂</span>
    </div>
    <span class="toggle-hint">click to view code</span>
  </div>

  <div class="editor" id="editor">
    <div class="line-nums">
      <div class="ln">1</div><div class="ln">2</div><div class="ln">3</div>
      <div class="ln">4</div><div class="ln">5</div><div class="ln">6</div>
      <div class="ln">7</div><div class="ln">8</div><div class="ln">9</div>
      <div class="ln">10</div>
    </div>
    <div class="code-area">
      <div class="code-line"><span class="cmt">&lt;!-- 🎂 birthday.html --&gt;</span></div>
      <div class="code-line"><span class="tag">&lt;html&gt;</span></div>
      <div class="code-line"><span class="tag">&lt;head&gt;</span></div>
      <div class="code-line"><span class="highlight-line">&nbsp;&nbsp;<span class="tag">&lt;title&gt;</span><span class="plain">Young Kim Happy Birthday</span><span class="tag">&lt;/title&gt;</span></span></div>
      <div class="code-line"><span class="tag">&lt;/head&gt;</span></div>
      <div class="code-line"><span class="tag">&lt;body&gt;</span></div>
      <div class="code-line"><span class="highlight-line">&nbsp;&nbsp;<span class="cmt">&lt;!-- 꺾이지 않는 마흔 :) --&gt;</span></span></div>
      <div class="code-line">&nbsp;&nbsp;<span class="tag">&lt;script&gt;</span></div>
      <div class="code-line"><span class="highlight-line">&nbsp;&nbsp;&nbsp;&nbsp;<span class="attr">location</span>.<span class="str">href</span>=<span class="val">"여기"</span></span></div>
      <div class="code-line">&nbsp;&nbsp;<span class="tag">&lt;/script&gt;</span><span class="cursor"></span></div>
    </div>
  </div>

  <div class="photo-section">
    <div class="output-label">✨ RENDERED OUTPUT</div>

    <div class="stage" id="stage">
      <span class="sticker sticker-1">🎈</span>
      <span class="sticker sticker-2">🎁</span>
      <span class="sticker sticker-3">⭐</span>

      <!-- 사진 4장 -->
      <div class="slide active" data-index="0"><img src="photo.jpg" alt="사진1"></div>
      <div class="slide" data-index="1"><img src="photo1.jpg" alt="사진2"></div>
      <div class="slide" data-index="2"><img src="photo2.jpg" alt="사진3"></div>
      <div class="slide last-photo" data-index="3"><img src="photo3.jpg" alt="사진4"></div>

      <!-- 텍스트 슬라이드 -->
      <div class="text-slide" data-index="4">
        <div class="text-content" style="font-size:2.8rem; color:#2d2d2d;">근데.....</div>
      </div>
      <div class="text-slide" data-index="5">
        <div class="birthday-content"><span class="gradient">생일은 축하해 :)</span></div>
      </div>

    </div>

    <div class="dots-indicator" id="dotsWrap">
      <div class="dot-ind active"></div>
      <div class="dot-ind"></div>
      <div class="dot-ind"></div>
      <div class="dot-ind"></div>
    </div>
  </div>
</div>

<script>
  function toggleCode() {
    const editor = document.getElementById('editor');
    editor.classList.toggle('visible');
    if (editor.classList.contains('visible')) {
      editor.querySelectorAll('.code-line').forEach(el => {
        el.style.opacity = '0';
        void el.offsetWidth;
      });
    }
  }

  const allSlides = document.querySelectorAll('.slide, .text-slide');
  const dotInds = document.querySelectorAll('.dot-ind');
  // 사진0(3s) 사진1(3s) 사진2(3s) 사진3(5s) 근데(3s) 생일축하해(∞)
  const durations = [3000, 3000, 3000, 5000, 3000, null];
  let current = 0;

  function goTo(next) {
    allSlides[current].classList.remove('active');
    if (current < 4) dotInds[current]?.classList.remove('active');

    current = next;
    allSlides[current].classList.add('active');
    if (current < 4) dotInds[current]?.classList.add('active');

    document.getElementById('dotsWrap').style.opacity = current >= 4 ? '0' : '1';

    const flash = document.getElementById('flash');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 500);

    // 생일축하해 도착
    if (current === 5) {
      spawnConfetti(); spawnConfetti();
      return;
    }

    if (durations[current]) {
      setTimeout(() => goTo(current + 1), durations[current]);
    }
  }

  // drawCircle 키프레임 동적 추가
  const style = document.createElement('style');
  style.textContent = `@keyframes drawCircle { to { stroke-dashoffset: 0; } }`;
  document.head.appendChild(style);

  setTimeout(() => goTo(1), durations[0]);

  function spawnConfetti() {
    const wrap = document.getElementById('confetti');
    const colors = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff8c69'];
    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'c';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (Math.random() * 8 + 6) + 'px';
        c.style.height = (Math.random() * 8 + 6) + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
        c.style.animationDelay = (Math.random() * 0.5) + 's';
        wrap.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 25);
    }
  }

  spawnConfetti();
  setInterval(spawnConfetti, 3000);
</script>
</body>
</html>
