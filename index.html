<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Young Kim Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff6b9d;
    --coral: #ff8c69;
    --yellow: #ffd93d;
    --mint: #6bcb77;
    --sky: #4d96ff;
    --purple: #c77dff;
    --bg: #fff9f0;
    --white: #ffffff;
    --dark: #2d2d2d;
    --gray: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Fira Code', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  .blob { position:fixed; border-radius:50%; filter:blur(80px); opacity:0.25; pointer-events:none; z-index:0; }
  .blob-1 { width:400px; height:400px; background:var(--pink); top:-100px; left:-100px; animation:float1 8s ease-in-out infinite; }
  .blob-2 { width:350px; height:350px; background:var(--yellow); top:50%; right:-100px; animation:float2 10s ease-in-out infinite; }
  .blob-3 { width:300px; height:300px; background:var(--mint); bottom:-80px; left:30%; animation:float1 7s ease-in-out infinite 2s; }

  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,30px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

  .card {
    position:relative; z-index:1; width:100%; max-width:680px;
    background:var(--white); border-radius:24px;
    box-shadow:0 20px 80px rgba(255,107,157,0.15), 0 4px 20px rgba(0,0,0,0.06);
    overflow:hidden; opacity:0; transform:translateY(40px);
    animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards 0.2s;
  }
  @keyframes slideUp { to { opacity:1; transform:translateY(0); } }

  .browser-bar {
    background:#f0f0f0; border-bottom:2px solid #e0e0e0;
    padding:12px 20px; display:flex; align-items:center; gap:12px;
  }
  .dots { display:flex; gap:7px; }
  .dot { width:13px; height:13px; border-radius:50%; }
  .dot.r{background:#ff5f57} .dot.y{background:#febc2e} .dot.g{background:#28c840}

  .url-bar {
    flex:1; background:white; border:1.5px solid #ddd; border-radius:8px;
    padding:6px 14px; font-size:12px; color:var(--gray);
    display:flex; align-items:center; gap:6px;
  }
  .url-pink { color:var(--pink); font-weight:600; }

  .editor { display:grid; grid-template-columns:48px 1fr; background:#fafafa; border-bottom:2px solid #f0f0f0; }
  .line-nums { background:#f5f5f5; border-right:2px solid #ebebeb; padding:24px 0; text-align:center; }
  .ln { font-size:12px; color:#ccc; line-height:2; user-select:none; }
  .code-area { padding:24px 20px; overflow-x:auto; }

  .code-line { font-size:13px; line-height:2; white-space:nowrap; opacity:0; }
  .code-line:nth-child(1)  { animation:appear 0s forwards 0.8s; }
  .code-line:nth-child(2)  { animation:appear 0s forwards 1.1s; }
  .code-line:nth-child(3)  { animation:appear 0s forwards 1.4s; }
  .code-line:nth-child(4)  { animation:appear 0s forwards 1.7s; }
  .code-line:nth-child(5)  { animation:appear 0s forwards 2.0s; }
  .code-line:nth-child(6)  { animation:appear 0s forwards 2.3s; }
  .code-line:nth-child(7)  { animation:appear 0s forwards 2.6s; }
  .code-line:nth-child(8)  { animation:appear 0s forwards 2.9s; }
  .code-line:nth-child(9)  { animation:appear 0s forwards 3.2s; }
  .code-line:nth-child(10) { animation:appear 0s forwards 3.5s; }
  @keyframes appear { to { opacity:1; } }

  .tag{color:#e05a9a;font-weight:500} .attr{color:#c77dff} .val{color:#ff8c69}
  .str{color:#27ae60} .cmt{color:#bbb;font-style:italic} .plain{color:var(--dark)}
  .highlight-line {
    background:linear-gradient(90deg,rgba(255,107,157,0.1),transparent);
    border-left:3px solid var(--pink); padding-left:6px;
    margin-left:-6px; border-radius:2px; display:block;
  }

  /* Photo section */
  .photo-section {
    padding: 2rem; text-align:center; opacity:0; transform:scale(0.95);
    animation:popIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards 4s;
  }
  @keyframes popIn { to { opacity:1; transform:scale(1); } }

  .output-label {
    display:inline-block;
    background:linear-gradient(135deg,var(--pink),var(--coral));
    color:white; font-size:11px; letter-spacing:2px;
    padding:5px 16px; border-radius:100px; margin-bottom:1.5rem; font-weight:600;
  }

  .photo-wrap { position:relative; display:inline-block; }
  .photo-wrap::before,.photo-wrap::after {
    content:''; position:absolute; width:28px; height:28px;
    border-style:solid; border-color:var(--pink); z-index:2;
  }
  .photo-wrap::before { top:-6px; left:-6px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
  .photo-wrap::after  { bottom:-6px; right:-6px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

  .photo-wrap img {
    display:block; max-width:100%; max-height:400px; border-radius:16px;
    box-shadow:0 12px 50px rgba(255,107,157,0.25), 0 4px 16px rgba(0,0,0,0.08);
    object-fit:contain;
  }

  .sticker { position:absolute; font-size:2rem; animation:wiggle 2s ease-in-out infinite; filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
  .sticker-1{top:-18px;right:-10px;animation-delay:0s}
  .sticker-2{bottom:-18px;left:-10px;animation-delay:0.5s}
  .sticker-3{top:40%;right:-24px;animation-delay:1s}
  @keyframes wiggle { 0%,100%{transform:rotate(-8deg) scale(1)} 50%{transform:rotate(8deg) scale(1.1)} }

  /* Message */
  .message {
    margin-top: 2rem;
    text-align: center;
    opacity: 0;
    animation: appear 0s forwards 5s;
  }

  .lines-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1.2rem;
  }

  .line-item {
    font-family: 'Noto Serif KR', serif;
    font-weight: 900;
    opacity: 0;
    transform: translateY(16px);
    color: var(--dark);
    position: relative;
  }

  /* 동일한 글씨 크기, 순서대로 등장 */
  .line-item:nth-child(1) {
    font-size: 2.2rem;
    animation: lineUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards 5.2s;
  }
  .line-item:nth-child(2) {
    font-size: 2.2rem;
    animation: lineUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards 5.8s;
  }
  .line-item:nth-child(3) {
    font-size: 2.2rem;
    animation: lineUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards 6.4s;
  }

  @keyframes lineUp {
    to { opacity:1; transform:translateY(0); }
  }

  .line-item .point {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* 반짝임 효과 - 3단락 다 나온 후 */
  .sparkle-wrap {
    position: relative;
    display: inline-block;
  }

  .sparkle-wrap::before,
  .sparkle-wrap::after {
    content: '✨';
    position: absolute;
    font-size: 1.5rem;
    opacity: 0;
    animation: sparkPop 0.5s ease forwards 7.2s;
  }
  .sparkle-wrap::before { left: -2.5rem; top: 50%; transform: translateY(-50%); }
  .sparkle-wrap::after  { right: -2.5rem; top: 50%; transform: translateY(-50%); animation-delay: 7.3s; }

  @keyframes sparkPop {
    0%   { opacity:0; transform:translateY(-50%) scale(0); }
    60%  { opacity:1; transform:translateY(-50%) scale(1.3); }
    100% { opacity:1; transform:translateY(-50%) scale(1); }
  }

  /* 전체 반짝 flash */
  .flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    border-radius: 24px;
    animation: flashIn 0.4s ease forwards 7.1s;
    z-index: 10;
  }
  @keyframes flashIn {
    0%   { opacity: 0; }
    30%  { opacity: 0.7; }
    100% { opacity: 0; }
  }

  /* ㅋㅋㅋ */
  .kk {
    font-family: 'Fira Code', monospace;
    font-size: 13px;
    color: var(--gray);
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    display: inline-block;
    animation: typing 1.5s steps(27) forwards 7.6s;
  }
  @keyframes typing { to { width: 100%; } }

  /* cursor */
  .cursor {
    display:inline-block; width:2px; height:14px;
    background:var(--pink); vertical-align:middle; margin-left:2px;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* confetti */
  .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:999; }
  .c { position:absolute; top:-20px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:0; } }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="confetti-wrap" id="confetti"></div>

<div class="card">
  <div class="flash-overlay"></div>

  <div class="browser-bar">
    <div class="dots">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    </div>
    <div class="url-bar">
      <span>🔒</span>
      <span>birthday.html — </span>
      <span class="url-pink">Young Kim Happy Birthday 🎂</span>
    </div>
  </div>

  <div class="editor">
    <div class="line-nums">
      <div class="ln">1</div><div class="ln">2</div><div class="ln">3</div>
      <div class="ln">4</div><div class="ln">5</div><div class="ln">6</div>
      <div class="ln">7</div><div class="ln">8</div><div class="ln">9</div>
      <div class="ln">10</div>
    </div>
    <div class="code-area">
      <div class="code-line"><span class="cmt">&lt;!-- 🎂 birthday.html --&gt;</span></div>
      <div class="code-line"><span class="tag">&lt;html&gt;</span></div>
      <div class="code-line"><span class="tag">&lt;head&gt;</span></div>
      <div class="code-line"><span class="highlight-line">&nbsp;&nbsp;<span class="tag">&lt;title&gt;</span><span class="plain">Young Kim Happy Birthday</span><span class="tag">&lt;/title&gt;</span></span></div>
      <div class="code-line"><span class="tag">&lt;/head&gt;</span></div>
      <div class="code-line"><span class="tag">&lt;body&gt;</span></div>
      <div class="code-line"><span class="highlight-line">&nbsp;&nbsp;<span class="cmt">&lt;!-- 꺾이지 않는 마흔 :) --&gt;</span></span></div>
      <div class="code-line">&nbsp;&nbsp;<span class="tag">&lt;script&gt;</span></div>
      <div class="code-line"><span class="highlight-line">&nbsp;&nbsp;&nbsp;&nbsp;<span class="attr">location</span>.<span class="str">href</span>=<span class="val">"여기"</span></span></div>
      <div class="code-line">&nbsp;&nbsp;<span class="tag">&lt;/script&gt;</span><span class="cursor"></span></div>
    </div>
  </div>

  <div class="photo-section">
    <div class="output-label">✨ RENDERED OUTPUT</div>
    <div class="photo-wrap">
      <span class="sticker sticker-1">🎈</span>
      <span class="sticker sticker-2">🎁</span>
      <span class="sticker sticker-3">⭐</span>
      <img src="photo.jpg" alt="Young Kim Birthday">
    </div>

    <div class="message">
      <div class="lines-wrap">
        <div class="line-item">
          <span class="point">중</span> 요한건
        </div>
        <div class="line-item">
          <span class="point">꺽</span> 이지 않는
        </div>
        <div class="line-item">
          <div class="sparkle-wrap">
            <span class="point">마</span> 흔
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  function spawnConfetti() {
    const wrap = document.getElementById('confetti');
    const colors = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff8c69'];
    for (let i = 0; i < 100; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'c';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (Math.random() * 8 + 6) + 'px';
        c.style.height = (Math.random() * 8 + 6) + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
        c.style.animationDelay = (Math.random() * 0.5) + 's';
        wrap.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 30);
    }
  }
  setTimeout(spawnConfetti, 4000);
  setTimeout(spawnConfetti, 7200);
  // 계속 폭죽 내리기
  setInterval(spawnConfetti, 3000);
</script>
</body>
</html>
